<form class="filter-panel" id="notice-search" method="get">
  <div class="filter-search-row">
    <label class="visually-hidden" for="q">검색</label>
    <div class="search-control">
      <span class="search-icon"><i class="bi bi-search"></i></span>
      <div class="search-field-wrap">
        <input class="form-control" type="search" id="q" name="q" value="{{ selected.q }}" placeholder="제목, 본문, 태그로 검색">
      </div>
      <button class="btn btn-success search-submit" type="submit">
        <i class="bi bi-arrow-right"></i><span>검색</span>
      </button>
    </div>
  </div>

  <div class="filter-grid">
    <div class="filter-field">
      <label class="form-label" for="agency">기관</label>
      <select class="form-select" id="agency" name="agency">
        <option value="">전체</option>
        {% for agency in agencies %}
          <option value="{{ agency.code }}" {% if selected.agency == agency.code %}selected{% endif %}>{{ agency.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="filter-field">
      <label class="form-label" for="category">카테고리</label>
      <select class="form-select" id="category" name="category">
        <option value="">전체</option>
        {% for value,label in categories %}
          <option value="{{ value }}" {% if selected.category == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="filter-field">
      <label class="form-label" for="tag">태그</label>
      <input class="form-control" id="tag" name="tag" value="{{ selected.tag }}" placeholder="smart_farm">
    </div>

    <div class="filter-field">
      <label class="form-label" for="ordering">정렬</label>
      <select class="form-select" id="ordering" name="ordering">
        <option value="latest" {% if selected.ordering == "latest" %}selected{% endif %}>최신순</option>
        <option value="deadline" {% if selected.ordering == "deadline" %}selected{% endif %}>마감임박순</option>
        <option value="importance" {% if selected.ordering == "importance" %}selected{% endif %}>추천도순</option>
      </select>
    </div>

    <div class="filter-field">
      <label class="form-label" for="posted_from">등록 시작</label>
      <input class="form-control" type="date" id="posted_from" name="posted_from" value="{{ selected.posted_from }}">
    </div>

    <div class="filter-field">
      <label class="form-label" for="posted_to">등록 종료</label>
      <input class="form-control" type="date" id="posted_to" name="posted_to" value="{{ selected.posted_to }}">
    </div>
  </div>

  <div class="filter-footer">
    <label class="deadline-toggle" for="deadline_soon">
      <input class="form-check-input" type="checkbox" role="switch" id="deadline_soon" name="deadline_soon" value="true" {% if selected.deadline_soon == "true" %}checked{% endif %}>
      <span class="deadline-toggle-icon"><i class="bi bi-alarm"></i></span>
      <span>마감임박</span>
    </label>
    <div class="filter-actions">
      <button class="btn btn-success" type="submit"><i class="bi bi-funnel me-1"></i>적용</button>
      <a class="btn btn-outline-secondary" href="{% url 'notices:notice_list' %}">
        <i class="bi bi-arrow-counterclockwise me-1"></i>초기화
      </a>
    </div>
  </div>
</form>
