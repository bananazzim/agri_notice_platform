{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Agri Notice{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'css/app.css' %}?v=20260617-7" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container-fluid app-shell">
      <a class="navbar-brand fw-semibold" href="{% url 'notices:notice_list' %}">
        <span class="brand-mark"><i class="bi bi-grid-1x2-fill"></i></span>
        <span>Agri Notice</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="메뉴 열기">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'notices:notice_list' %}">
              <i class="bi bi-collection me-1"></i>공고
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'notices:deadline_soon' %}">
              <i class="bi bi-clock-history me-1"></i>마감임박
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'notices:stats' %}">
              <i class="bi bi-bar-chart me-1"></i>통계
            </a>
          </li>
        </ul>
        <a class="btn btn-sm btn-outline-secondary admin-button" href="/admin/">
          <i class="bi bi-shield-lock me-1"></i>Admin
        </a>
      </div>
    </div>
  </nav>

  <main class="container-fluid app-shell py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/app.js' %}?v=20260617-4" defer></script>
</body>
</html>
